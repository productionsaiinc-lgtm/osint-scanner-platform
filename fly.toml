# Fly.io Configuration for OSINT Scanner Platform
# Deploy with: fly deploy

app = "osint-scanner"
primary_region = "pdx"  # Portland, Oregon - change to your closest region

[build]
  builder = "heroku"
  buildpacks = ["heroku/nodejs"]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/health"

[processes]
  app = "node dist/index.js"
  release = "pnpm drizzle-kit migrate"

[[mounts]]
  source = "data"
  destination = "/app/data"
  size_gb = 1

[checks]
  [checks.status]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

# Secrets and environment variables are set via fly secrets set
# Example: fly secrets set STRIPE_SECRET_KEY=sk_live_xxx

# Regions available: ams, arn, atl, bog, bos, cdg, den, dfw, dub, ewr, eze, fra, gdl, gig, gru, hkg, iad, jnb, lax, lhr, mad, mde, mia, nrt, otp, pdx, phl, phx, qro, sao, sea, sin, sjc, syd, tpe, tlv, yvr, yyz
# Change primary_region to your preferred location

# PostgreSQL Database Configuration
# Create database with: fly postgres create
# Then attach with: fly postgres attach --app osint-scanner

# Scaling configuration (adjust based on traffic)
[processes.app]
  memory = 256
  cpu_kind = "shared"
  cpus = 1

# Auto-scaling (optional - requires paid plan)
# [[processes.app.auto_scaling]]
